name: aqua_pet
description: "Water Intake Reminder"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_floating_bottom_bar: ^2.0.1
  flutter_3d_controller: ^2.3.0
  flutter_local_notifications: ^22.0.1
  table_calendar: ^3.2.0
  geolocator: ^14.0.3
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  windows:
    generate: true
  macos:
    generate: true
  linux: true

  image_path: "assets/images/launch_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/models/plant.glb
    - assets/models/cactus.glb